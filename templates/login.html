<!-- Template Login -->
<section id="loginSection" class="login-section">
    <div class="login-card">
        <div class="login-logo">🏫</div>
        <h1 class="login-title">Selamat Datang!</h1>
        <p class="login-subtitle">Silakan login untuk mulai mengisi absensi</p>
        
        <form id="loginForm" class="login-form">
            <div class="form-group">
                <label for="username"><span class="label-icon">👤</span> Username</label>
                <input type="text" id="username" required autocomplete="username" placeholder="Masukkan username">
            </div>
            <div class="form-group">
                <label for="password"><span class="label-icon">🔒</span> Password</label>
                <input type="password" id="password" required autocomplete="current-password" placeholder="Masukkan password">
            </div>
            <button type="submit" class="btn-primary btn-full">
                <span class="btn-text">Login</span>
                <span class="btn-loader hidden">⏳ Memproses...</span>
            </button>
            <p id="loginMsg" class="login-msg"></p>
        </form>
    </div>
</section>
