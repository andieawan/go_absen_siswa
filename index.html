<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Absensi Siswa PWA</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <meta name="theme-color" content="#2563eb">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <header class="app-header">
    <div class="header-content">
      <h1>Absensi Siswa</h1>
      <span id="status-mode" class="badge badge-info">Memuat...</span>
    </div>
  </header>

  <main class="app-container">
    <!-- Form Filter/Parameter -->
    <section class="card filter-section">
      <div class="form-group">
        <label for="select-kelas">Pilih Kelas</label>
        <select id="select-kelas" disabled>
          <option value="">-- Pilih Kelas --</option>
        </select>
      </div>

      <div class="form-group">
        <label for="input-tanggal">Tanggal Pertemuan</label>
        <input type="date" id="input-tanggal">
      </div>
    </section>

    <!-- Area Loading & Pesan -->
    <div id="loader" class="loader hidden"></div>
    <div id="alert-msg" class="alert hidden"></div>

    <!-- Daftar Siswa -->
    <section id="absensi-section" class="hidden">
      <div class="section-title">
        <h2>Daftar Siswa</h2>
        <span id="total-siswa" class="badge-count">0 Siswa</span>
      </div>

      <form id="form-absensi">
        <div id="container-siswa" class="list-siswa">
          <!-- Item siswa akan di-render via JavaScript -->
        </div>

        <button type="submit" id="btn-simpan" class="btn-submit">
          <span>Simpan Absensi</span>
        </button>
      </form>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
