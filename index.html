<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="theme-color" content="#4F46E5">
    <title>Aplikasi Absensi Sekolah</title>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
    
    <link rel="stylesheet" href="css/main.css?v=20260724">
</head>
<body>

    <div class="container">
        <!-- Container utama untuk konten dinamis -->
        <main id="app"></main>
    </div>

    <!-- MODAL ALERT -->
    <div id="customAlert" class="modal-overlay" role="dialog" aria-modal="true">
        <div class="modal-box">
            <div id="alertIcon" class="modal-icon icon-success">✓</div>
            <h3 id="alertTitle" class="modal-title">Pemberitahuan</h3>
            <p id="alertMessage" class="modal-message">Pesan di sini</p>
            <button class="modal-btn btn-primary" onclick="closeCustomAlert()">OK, Mengerti</button>
        </div>
    </div>

    <!-- MODAL KONFIRMASI -->
    <div id="confirmModal" class="modal-overlay" role="dialog" aria-modal="true">
        <div class="modal-box">
            <div class="modal-icon icon-warning">❓</div>
            <h3 class="modal-title">Konfirmasi</h3>
            <p id="confirmMessage" class="modal-message">Pesan di sini</p>
            <div class="modal-btn-group">
                <button id="confirmBtnNo" class="modal-btn btn-secondary">Tidak</button>
                <button id="confirmBtnYes" class="modal-btn btn-primary">Ya, Lanjutkan</button>
            </div>
        </div>
    </div>

    <!-- Container untuk notifikasi toast -->
    <div id="notification-container"></div>

    <!-- Main Entry Point dengan ES6 Modules -->
    <script type="module" src="js/main.js"></script>
</body>
</html>
